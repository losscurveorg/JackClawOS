<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦞 JackClaw Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 24px 32px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 16px; }
.header h1 { font-size: 24px; color: #fff; }
.header .badge { background: #22c55e; color: #000; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.header .badge.offline { background: #ef4444; color: #fff; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 24px 32px; }
.card { background: #1a1a2e; border: 1px solid #333; border-radius: 12px; padding: 20px; }
.card h2 { font-size: 16px; color: #888; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
.stat { font-size: 48px; font-weight: 700; color: #fff; }
.stat-label { font-size: 14px; color: #666; margin-top: 4px; }
.node-list { list-style: none; }
.node-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #222; }
.node-item:last-child { border-bottom: none; }
.node-dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
.node-dot.offline { background: #666; }
.node-name { font-weight: 600; color: #fff; }
.node-role { color: #888; font-size: 13px; }
.node-meta { color: #555; font-size: 12px; margin-left: auto; }
.report-item { padding: 12px 0; border-bottom: 1px solid #222; }
.report-item:last-child { border-bottom: none; }
.report-from { color: #60a5fa; font-weight: 600; font-size: 13px; }
.report-text { color: #ccc; margin-top: 4px; font-size: 14px; }
.report-time { color: #555; font-size: 11px; margin-top: 4px; }
.msg-item { padding: 8px 0; }
.msg-from { color: #22c55e; font-weight: 600; font-size: 12px; }
.msg-text { color: #ddd; font-size: 14px; }
.msg-time { color: #555; font-size: 11px; }
.empty { color: #555; font-style: italic; padding: 20px 0; text-align: center; }
.refresh-bar { text-align: right; padding: 8px 32px; color: #555; font-size: 12px; }
.err { color: #ef4444; text-align: center; padding: 40px; }
</style>
</head>
<body>
<div class="header">
  <span style="font-size:32px">🦞</span>
  <h1>JackClaw Dashboard</h1>
  <span id="hub-badge" class="badge">Connecting...</span>
  <a href="/app/" style="margin-left:auto;color:#22c55e;font-size:13px;text-decoration:none">📱 Install App</a>
  <span style="color:#555;font-size:13px;margin-left:12px" id="hub-url"></span>
</div>
<div class="refresh-bar">Auto-refresh every 5s · <span id="last-refresh">—</span></div>

<div class="grid">
  <div class="card">
    <h2>📡 Nodes</h2>
    <div id="node-count"><span class="stat">—</span><div class="stat-label">registered</div></div>
    <ul class="node-list" id="node-list"></ul>
  </div>

  <div class="card">
    <h2>📝 Today's Reports</h2>
    <div id="report-count"><span class="stat">—</span><div class="stat-label">reports</div></div>
    <div id="report-list"></div>
  </div>

  <div class="card">
    <h2>💬 Recent Messages</h2>
    <div id="msg-list"></div>
  </div>

  <div class="card">
    <h2>🔐 Hub Info</h2>
    <div id="hub-info" style="color:#888">Loading...</div>
  </div>

  <div class="card" style="grid-column: 1 / -1;">
    <h2>💰 Pending Payments (CEO Approval)</h2>
    <div id="payment-count"><span class="stat" style="font-size:32px">0</span><div class="stat-label">awaiting approval</div></div>
    <div id="payment-list" style="margin-top:12px"></div>
  </div>

  <div class="card" style="grid-column: 1 / -1;">
    <h2>💬 ClawChat (Live)</h2>
    <div id="chat-log" style="height:200px;overflow-y:auto;background:#111;border-radius:8px;padding:12px;margin-bottom:12px;font-family:monospace;"></div>
    <div style="display:flex;gap:8px;">
      <select id="chat-to" style="background:#222;color:#fff;border:1px solid #444;border-radius:6px;padding:8px 12px;font-size:13px;"><option>Loading nodes...</option></select>
      <input id="chat-input" type="text" placeholder="Type a message..." style="flex:1;background:#222;color:#fff;border:1px solid #444;border-radius:6px;padding:8px 12px;font-size:14px;outline:none;" />
      <button onclick="sendChat()" style="background:#22c55e;color:#000;border:none;border-radius:6px;padding:8px 20px;font-weight:600;cursor:pointer;font-size:14px;">Send</button>
    </div>
  </div>
</div>

<script>
const HUB = location.origin;
document.getElementById('hub-url').textContent = HUB;
let ceoToken = localStorage.getItem('jc-ceo-token') || '';

async function api(method, path, body, token) {
  const h = { 'Content-Type': 'application/json' };
  if (token) h['Authorization'] = 'Bearer ' + token;
  try {
    const r = await fetch(HUB + path, { method, headers: h, body: body ? JSON.stringify(body) : undefined });
    return { s: r.status, b: await r.json().catch(() => null) };
  } catch { return { s: 0, b: null }; }
}

async function ensureCeo() {
  if (ceoToken) return;
  const r = await api('POST', '/api/register', {
    nodeId: 'dashboard-ceo', name: '🖥️ Dashboard', role: 'ceo', publicKey: 'dashboard-key'
  });
  if (r.b?.token) { ceoToken = r.b.token; localStorage.setItem('jc-ceo-token', ceoToken); }
}

async function refresh() {
  // Health
  const health = await api('GET', '/health');
  const badge = document.getElementById('hub-badge');
  if (health.s === 200) {
    badge.textContent = 'Online';
    badge.className = 'badge';
  } else {
    badge.textContent = 'Offline';
    badge.className = 'badge offline';
    return;
  }

  await ensureCeo();

  // Hub info
  document.getElementById('hub-info').innerHTML =
    '<div>Status: <b style="color:#22c55e">Online</b></div>' +
    '<div>Service: ' + (health.b?.service || '—') + '</div>' +
    '<div>Uptime: ' + new Date(health.b?.ts || 0).toLocaleString() + '</div>';

  // Nodes
  const nodes = await api('GET', '/api/nodes', null, ceoToken);
  const nodeList = document.getElementById('node-list');
  const nodeArr = nodes.b?.nodes || [];
  document.querySelector('#node-count .stat').textContent = nodeArr.length;
  if (nodeArr.length === 0) {
    nodeList.innerHTML = '<div class="empty">No nodes registered yet</div>';
  } else {
    nodeList.innerHTML = nodeArr.map(n => {
      const ago = n.lastReportAt ? Math.round((Date.now() - n.lastReportAt) / 60000) + 'm ago' : 'never';
      return '<li class="node-item"><div class="node-dot"></div><div><div class="node-name">' +
        n.name + '</div><div class="node-role">' + n.role + ' · ' + n.nodeId.slice(0,12) +
        '</div></div><div class="node-meta">Last report: ' + ago + '</div></li>';
    }).join('');
  }

  // Summary
  const today = new Date().toISOString().slice(0,10);
  const summary = await api('GET', '/api/summary?date=' + today, null, ceoToken);
  const reportList = document.getElementById('report-list');
  const byRole = summary.b?.byRole || {};
  document.querySelector('#report-count .stat').textContent = summary.b?.reportingNodes || 0;
  const allReports = [];
  Object.values(byRole).forEach(role => (role.nodes || []).forEach(n => allReports.push(n)));
  if (allReports.length === 0) {
    reportList.innerHTML = '<div class="empty">No reports today</div>';
  } else {
    reportList.innerHTML = allReports.map(r =>
      '<div class="report-item"><div class="report-from">' + r.name + ' (' + r.nodeId + ')</div>' +
      '<div class="report-text">' + (r.summary || '—') + '</div>' +
      '<div class="report-time">' + new Date(r.reportedAt).toLocaleTimeString() + '</div></div>'
    ).join('');
  }

  // Pending payments
  const payments = await api('GET', '/api/payment/pending', null, ceoToken);
  const pendingList = payments.b?.requests || [];
  document.querySelector('#payment-count .stat').textContent = pendingList.length;
  const paymentListEl = document.getElementById('payment-list');
  if (paymentListEl) {
    if (!pendingList.length) {
      paymentListEl.innerHTML = '<div class="empty">No pending payments</div>';
    } else {
      paymentListEl.innerHTML = pendingList.map(p =>
        '<div class="report-item" style="display:flex;align-items:center;gap:12px">' +
        '<div style="flex:1"><div class="report-from">' + p.nodeId + ' → ' + p.recipient + '</div>' +
        '<div class="report-text">' + p.description + '</div></div>' +
        '<div style="color:#22c55e;font-weight:700;font-size:18px">' + p.currency + ' ' + p.amount + '</div>' +
        '<button onclick="approvePayment(\''+p.id+'\')" style="background:#22c55e;color:#000;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-weight:600">Approve</button>' +
        '<button onclick="rejectPayment(\''+p.id+'\')" style="background:#ef4444;color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-weight:600">Reject</button>' +
        '</div>'
      ).join('');
    }
  }

  document.getElementById('last-refresh').textContent = new Date().toLocaleTimeString();

  // Update chat node selector
  const sel = document.getElementById('chat-to');
  if (sel && nodeArr.length > 0) {
    const current = sel.value;
    sel.innerHTML = nodeArr.map(n => '<option value="'+n.nodeId+'"'+(n.nodeId===current?' selected':'')+'>'+n.name+'</option>').join('');
  }
}

refresh();
setInterval(refresh, 5000);

// ─── WebSocket Chat ─────────────────────────────────────────────────
const chatNodeId = 'dashboard-user-' + Math.random().toString(36).slice(2,6);
const wsUrl = location.origin.replace(/^http/, 'ws') + '/chat/ws?nodeId=' + chatNodeId;
let chatWs;
const chatLog = document.getElementById('chat-log');

function connectChat() {
  chatWs = new WebSocket(wsUrl);
  chatWs.onopen = () => appendChat('system', 'Connected as ' + chatNodeId);
  chatWs.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.event === 'message') appendChat(d.data.from, d.data.content);
      if (d.event === 'ack') {} // silent
    } catch {}
  };
  chatWs.onclose = () => { appendChat('system', 'Disconnected. Reconnecting...'); setTimeout(connectChat, 2000); };
}

function appendChat(from, text) {
  if (!chatLog) return;
  const t = new Date().toLocaleTimeString().slice(0,5);
  const cls = from === 'system' ? 'color:#666;font-style:italic' : from === chatNodeId ? 'color:#22c55e' : 'color:#60a5fa';
  chatLog.innerHTML += '<div style="padding:2px 0"><span style="color:#555;font-size:11px">['+t+']</span> <span style="'+cls+';font-weight:600;font-size:12px">'+from+'</span>: <span style="color:#ddd;font-size:13px">'+text+'</span></div>';
  chatLog.scrollTop = chatLog.scrollHeight;
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const to = document.getElementById('chat-to');
  if (!input || !to || !input.value.trim()) return;
  const msg = {
    id: 'dash-'+Date.now()+'-'+Math.random().toString(36).slice(2,5),
    from: chatNodeId, to: to.value, content: input.value.trim(),
    type: 'human', ts: Date.now(), signature: '', encrypted: false
  };
  if (chatWs && chatWs.readyState === 1) {
    chatWs.send(JSON.stringify(msg));
    appendChat(chatNodeId, input.value.trim());
  }
  input.value = '';
}

document.getElementById('chat-input')?.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChat(); });
connectChat();

async function approvePayment(id) {
  const r = await api('POST', '/api/payment/approve/' + id, {}, ceoToken);
  if (r.s === 200) { appendChat('system', '✅ Payment approved'); refresh(); }
}
async function rejectPayment(id) {
  const r = await api('POST', '/api/payment/reject/' + id, {}, ceoToken);
  if (r.s === 200) { appendChat('system', '❌ Payment rejected'); refresh(); }
}
</script>
</body>
</html>
