<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#22c55e">
<title>JackClaw</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--green:#22c55e;--bg:#0a0a0a;--card:#1a1a2e;--border:#333;--text:#e0e0e0;--muted:#888;--dim:#555;--blue:#60a5fa;--red:#ef4444;--safe-b:env(safe-area-inset-bottom,0px)}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* Header */
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top,0px));display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0}
.header .logo{font-size:24px}
.header h1{font-size:18px;color:#fff;font-weight:700}
.header .badge{background:var(--green);color:#000;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600}
.header .badge.offline{background:var(--red);color:#fff}
.header .install-btn{margin-left:auto;background:none;border:1px solid var(--green);color:var(--green);padding:4px 12px;border-radius:8px;font-size:12px;cursor:pointer;display:none}

/* Tab content */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:calc(72px + var(--safe-b))}

/* Tab panels */
.tab-panel{display:none}
.tab-panel.active{display:block}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-b);flex-shrink:0;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0;cursor:pointer;color:var(--muted);font-size:10px;gap:2px;transition:color .2s}
.nav-item.active{color:var(--green)}
.nav-item .icon{font-size:20px}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.card h2{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}

/* Node list */
.node-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #222}
.node-item:last-child{border-bottom:none}
.node-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.node-dot.offline{background:var(--dim)}
.node-name{font-weight:600;color:#fff;font-size:14px}
.node-role{color:var(--muted);font-size:12px}
.node-meta{color:var(--dim);font-size:11px;margin-left:auto;text-align:right}

/* Chat */
.chat-log{background:#111;border-radius:8px;padding:10px;height:calc(100vh - 220px);overflow-y:auto;font-family:monospace;font-size:13px;margin-bottom:10px}
.chat-bar{display:flex;gap:8px;position:sticky;bottom:0}
.chat-bar input{flex:1;background:#222;color:#fff;border:1px solid #444;border-radius:8px;padding:10px 12px;font-size:14px;outline:none}
.chat-bar button{background:var(--green);color:#000;border:none;border-radius:8px;padding:10px 16px;font-weight:600;font-size:14px;cursor:pointer}

/* Reports */
.report-item{padding:10px 0;border-bottom:1px solid #222}
.report-item:last-child{border-bottom:none}
.report-from{color:var(--blue);font-weight:600;font-size:13px}
.report-text{color:#ccc;margin-top:4px;font-size:14px;line-height:1.4}
.report-time{color:var(--dim);font-size:11px;margin-top:4px}

/* Settings */
.setting-group{margin-bottom:16px}
.setting-group label{display:block;color:var(--muted);font-size:12px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.setting-group input{width:100%;background:#222;color:#fff;border:1px solid #444;border-radius:8px;padding:10px 12px;font-size:14px;outline:none}
.setting-group input:focus{border-color:var(--green)}
.btn{display:inline-block;background:var(--green);color:#000;border:none;border-radius:8px;padding:10px 20px;font-weight:600;font-size:14px;cursor:pointer;margin-top:8px}
.btn.outline{background:none;border:1px solid var(--border);color:var(--text)}
.status-msg{margin-top:8px;font-size:13px;padding:8px;border-radius:6px}
.status-msg.ok{background:#22c55e22;color:var(--green)}
.status-msg.err{background:#ef444422;color:var(--red)}

/* Empty */
.empty{color:var(--dim);font-style:italic;padding:20px 0;text-align:center}
.stat-big{font-size:36px;font-weight:700;color:#fff}
.stat-label{font-size:12px;color:var(--dim);margin-top:2px}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <span class="logo">🦞</span>
  <h1>JackClaw</h1>
  <span id="hub-badge" class="badge">···</span>
  <button id="install-btn" class="install-btn" onclick="installPwa()">📱 Install</button>
</div>

<!-- Tab: Nodes -->
<div id="tab-nodes" class="content tab-panel active">
  <div class="card">
    <h2>📡 Registered Nodes</h2>
    <div id="node-stat"><span class="stat-big">—</span><div class="stat-label">nodes</div></div>
  </div>
  <div class="card" id="node-list-card">
    <div id="node-list" class="empty">Loading...</div>
  </div>
</div>

<!-- Tab: Chat -->
<div id="tab-chat" class="content tab-panel" style="padding-bottom:calc(140px + var(--safe-b))">
  <div class="chat-log" id="chat-log"></div>
  <div class="chat-bar">
    <input id="chat-input" type="text" placeholder="Message..." autocomplete="off" />
    <button onclick="sendChat()">Send</button>
  </div>
</div>

<!-- Tab: Reports -->
<div id="tab-reports" class="content tab-panel">
  <div class="card">
    <h2>📝 Today's Summary</h2>
    <div id="report-stat"><span class="stat-big">—</span><div class="stat-label">reporting nodes</div></div>
  </div>
  <div class="card">
    <div id="report-list" class="empty">Loading...</div>
  </div>
</div>

<!-- Tab: Settings -->
<div id="tab-settings" class="content tab-panel">
  <div class="card">
    <h2>⚙️ Hub Connection</h2>
    <div class="setting-group">
      <label>Hub URL</label>
      <input id="hub-url-input" type="url" placeholder="http://localhost:3100" />
    </div>
    <button class="btn" onclick="testConnection()">Test Connection</button>
    <button class="btn outline" onclick="saveHubUrl()" style="margin-left:8px">Save</button>
    <div id="conn-status"></div>
  </div>
  <div class="card">
    <h2>ℹ️ About</h2>
    <div style="color:var(--muted);font-size:13px;line-height:1.6">
      <div>🦞 JackClaw PWA v1.0</div>
      <div>Multi-agent orchestration dashboard</div>
      <div style="margin-top:8px">Cache: <span id="cache-status">—</span></div>
      <div>SW: <span id="sw-status">—</span></div>
    </div>
  </div>
  <div class="card">
    <h2>🗑️ Data</h2>
    <button class="btn outline" onclick="clearData()">Clear Local Storage</button>
  </div>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
  <div class="nav-item active" onclick="switchTab('nodes')" data-tab="nodes">
    <span class="icon">📡</span><span>Nodes</span>
  </div>
  <div class="nav-item" onclick="switchTab('chat')" data-tab="chat">
    <span class="icon">💬</span><span>Chat</span>
  </div>
  <div class="nav-item" onclick="switchTab('reports')" data-tab="reports">
    <span class="icon">📝</span><span>Reports</span>
  </div>
  <div class="nav-item" onclick="switchTab('settings')" data-tab="settings">
    <span class="icon">⚙️</span><span>Settings</span>
  </div>
</nav>

<script>
// ─── Config ─────────────────────────────────────────────────────────────────
const HUB = localStorage.getItem('jc-hub-url') || location.origin;
let ceoToken = localStorage.getItem('jc-ceo-token') || '';

document.getElementById('hub-url-input').value = HUB;

// ─── Tab Navigation ─────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelector('[data-tab="' + name + '"]').classList.add('active');
  if (name === 'chat' && !chatWs) connectChat();
}

// ─── API Helper ─────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const h = { 'Content-Type': 'application/json' };
  if (ceoToken) h['Authorization'] = 'Bearer ' + ceoToken;
  try {
    const r = await fetch(HUB + path, { method, headers: h, body: body ? JSON.stringify(body) : undefined });
    return { s: r.status, b: await r.json().catch(() => null) };
  } catch { return { s: 0, b: null }; }
}

// ─── Auth ───────────────────────────────────────────────────────────────────
async function ensureCeo() {
  if (ceoToken) return;
  const r = await api('POST', '/api/register', { nodeId: 'pwa-dashboard', name: '📱 PWA Dashboard', role: 'ceo', publicKey: 'pwa-key' });
  if (r.b?.token) { ceoToken = r.b.token; localStorage.setItem('jc-ceo-token', ceoToken); }
}

// ─── Refresh Data ───────────────────────────────────────────────────────────
let nodeArr = [];

async function refresh() {
  const health = await api('GET', '/health');
  const badge = document.getElementById('hub-badge');
  if (health.s === 200) {
    badge.textContent = 'Online';
    badge.className = 'badge';
  } else {
    badge.textContent = 'Offline';
    badge.className = 'badge offline';
    return;
  }

  await ensureCeo();

  // Nodes
  const nodes = await api('GET', '/api/nodes');
  nodeArr = nodes.b?.nodes || [];
  document.querySelector('#node-stat .stat-big').textContent = nodeArr.length;
  const nl = document.getElementById('node-list');
  if (!nodeArr.length) {
    nl.innerHTML = '<div class="empty">No nodes registered</div>';
  } else {
    nl.innerHTML = nodeArr.map(n => {
      const ago = n.lastReportAt ? Math.round((Date.now() - n.lastReportAt) / 60000) + 'm ago' : 'never';
      return '<div class="node-item"><div class="node-dot"></div><div><div class="node-name">' + n.name +
        '</div><div class="node-role">' + n.role + '</div></div><div class="node-meta">' + ago + '</div></div>';
    }).join('');
  }

  // Reports
  const today = new Date().toISOString().slice(0, 10);
  const summary = await api('GET', '/api/summary?date=' + today);
  const byRole = summary.b?.byRole || {};
  document.querySelector('#report-stat .stat-big').textContent = summary.b?.reportingNodes || 0;
  const allReports = [];
  Object.values(byRole).forEach(role => (role.nodes || []).forEach(n => allReports.push(n)));
  const rl = document.getElementById('report-list');
  if (!allReports.length) {
    rl.innerHTML = '<div class="empty">No reports today</div>';
  } else {
    rl.innerHTML = allReports.map(r =>
      '<div class="report-item"><div class="report-from">' + r.name + '</div>' +
      '<div class="report-text">' + (r.summary || '—') + '</div>' +
      '<div class="report-time">' + new Date(r.reportedAt).toLocaleTimeString() + '</div></div>'
    ).join('');
  }
}

refresh();
setInterval(refresh, 8000);

// ─── Chat (WebSocket) ──────────────────────────────────────────────────────
const chatNodeId = 'pwa-' + Math.random().toString(36).slice(2, 6);
let chatWs = null;
const chatLog = document.getElementById('chat-log');

function connectChat() {
  const wsUrl = HUB.replace(/^http/, 'ws') + '/chat/ws?nodeId=' + chatNodeId;
  chatWs = new WebSocket(wsUrl);
  chatWs.onopen = () => appendChat('system', 'Connected as ' + chatNodeId);
  chatWs.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.event === 'message') appendChat(d.data.from, d.data.content);
    } catch {}
  };
  chatWs.onclose = () => {
    appendChat('system', 'Disconnected. Reconnecting...');
    chatWs = null;
    setTimeout(connectChat, 3000);
  };
}

function appendChat(from, text) {
  const t = new Date().toLocaleTimeString().slice(0, 5);
  const c = from === 'system' ? '#666' : from === chatNodeId ? '#22c55e' : '#60a5fa';
  chatLog.innerHTML += '<div style="padding:2px 0"><span style="color:#555;font-size:11px">[' + t + ']</span> <span style="color:' + c + ';font-weight:600;font-size:12px">' + from + '</span>: <span style="color:#ddd">' + text + '</span></div>';
  chatLog.scrollTop = chatLog.scrollHeight;
}

function sendChat() {
  const input = document.getElementById('chat-input');
  if (!input || !input.value.trim() || !chatWs || chatWs.readyState !== 1) return;
  const msg = {
    id: 'pwa-' + Date.now() + '-' + Math.random().toString(36).slice(2, 5),
    from: chatNodeId, to: 'broadcast', content: input.value.trim(),
    type: 'human', ts: Date.now(), signature: '', encrypted: false
  };
  chatWs.send(JSON.stringify(msg));
  appendChat(chatNodeId, input.value.trim());
  input.value = '';
}

document.getElementById('chat-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChat(); });

// ─── Settings ───────────────────────────────────────────────────────────────
async function testConnection() {
  const url = document.getElementById('hub-url-input').value.replace(/\/+$/, '');
  const el = document.getElementById('conn-status');
  el.innerHTML = '<div class="status-msg" style="color:var(--muted)">Testing...</div>';
  try {
    const r = await fetch(url + '/health');
    const d = await r.json();
    if (d.status === 'ok') {
      el.innerHTML = '<div class="status-msg ok">✅ Connected — ' + d.service + '</div>';
    } else {
      el.innerHTML = '<div class="status-msg err">❌ Unexpected response</div>';
    }
  } catch (e) {
    el.innerHTML = '<div class="status-msg err">❌ Failed: ' + e.message + '</div>';
  }
}

function saveHubUrl() {
  const url = document.getElementById('hub-url-input').value.replace(/\/+$/, '');
  localStorage.setItem('jc-hub-url', url);
  document.getElementById('conn-status').innerHTML = '<div class="status-msg ok">Saved. Reload to apply.</div>';
}

function clearData() {
  localStorage.clear();
  caches.keys().then(ks => ks.forEach(k => caches.delete(k)));
  document.getElementById('conn-status').innerHTML = '<div class="status-msg ok">Cleared. Reloading...</div>';
  setTimeout(() => location.reload(), 500);
}

// ─── Service Worker ─────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then((reg) => {
      document.getElementById('sw-status').textContent = 'Registered ✅';
      console.log('[pwa] SW registered', reg.scope);
    })
    .catch((err) => {
      document.getElementById('sw-status').textContent = 'Failed ❌';
      console.error('[pwa] SW registration failed', err);
    });
}

// Cache status
caches.keys().then(ks => {
  document.getElementById('cache-status').textContent = ks.length ? ks.join(', ') : 'Empty';
});

// ─── PWA Install Prompt ─────────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-btn').style.display = 'block';
});

function installPwa() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('install-btn').style.display = 'none';
  });
}
</script>
</body>
</html>
