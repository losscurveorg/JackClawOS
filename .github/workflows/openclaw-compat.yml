name: OpenClaw Compatibility

on:
  schedule:
    # Run daily at 08:00 UTC (16:00 CST)
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-update:
    runs-on: ubuntu-latest
    outputs:
      has_update: ${{ steps.check.outputs.has_update }}
      current_version: ${{ steps.check.outputs.current_version }}
      latest_version: ${{ steps.check.outputs.latest_version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Check OpenClaw latest version
        id: check
        run: |
          LATEST=$(npm view openclaw version 2>/dev/null || echo "unknown")
          CURRENT=$(node -e "
            try {
              const pkg = require('./packages/openclaw-plugin/package.json');
              const ver = (pkg.peerDependencies || {})['openclaw'] || (pkg.devDependencies || {})['openclaw'] || 'none';
              console.log(ver.replace(/[\^~>=<]/g, ''));
            } catch { console.log('none'); }
          ")
          echo "latest_version=$LATEST" >> $GITHUB_OUTPUT
          echo "current_version=$CURRENT" >> $GITHUB_OUTPUT
          if [ "$LATEST" != "$CURRENT" ] && [ "$LATEST" != "unknown" ]; then
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "🔄 OpenClaw update available: $CURRENT → $LATEST"
          else
            echo "has_update=false" >> $GITHUB_OUTPUT
            echo "✅ OpenClaw is up to date ($CURRENT)"
          fi

  compat-test:
    runs-on: ubuntu-latest
    needs: check-update
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install latest OpenClaw SDK
        run: |
          npm install openclaw@latest --no-save 2>/dev/null || echo "openclaw not on npm, using local types"

      - name: Build all packages
        run: npm run build

      - name: Type-check plugin against latest SDK
        run: |
          cd packages/openclaw-plugin
          npx tsc --noEmit 2>&1
          echo "✅ Plugin type-check passed against latest OpenClaw SDK"

      - name: Run E2E tests
        run: |
          rm -rf ~/.jackclaw/hub
          node tests/e2e.js

  auto-update:
    runs-on: ubuntu-latest
    needs: [check-update, compat-test]
    if: needs.check-update.outputs.has_update == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Update OpenClaw dependency
        run: |
          LATEST="${{ needs.check-update.outputs.latest_version }}"

          # Update peerDependencies in openclaw-plugin
          cd packages/openclaw-plugin
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            if (!pkg.peerDependencies) pkg.peerDependencies = {};
            pkg.peerDependencies['openclaw'] = '>=${LATEST}';
            if (pkg.devDependencies?.['openclaw']) pkg.devDependencies['openclaw'] = '^${LATEST}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          cd ../..

          # Re-install and verify build
          npm install
          npm run build

      - name: Run tests after update
        run: |
          rm -rf ~/.jackclaw/hub
          node tests/e2e.js

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update OpenClaw compat to ${{ needs.check-update.outputs.latest_version }}"
          title: "🔄 OpenClaw ${{ needs.check-update.outputs.current_version }} → ${{ needs.check-update.outputs.latest_version }}"
          body: |
            ## OpenClaw Compatibility Update

            | | Version |
            |---|---|
            | Previous | `${{ needs.check-update.outputs.current_version }}` |
            | Latest | `${{ needs.check-update.outputs.latest_version }}` |

            ### Automated checks passed:
            - ✅ Full build (`npm run build`)
            - ✅ Plugin type-check against latest SDK
            - ✅ E2E test suite (45 assertions)

            _Auto-generated by OpenClaw Compatibility CI_
          branch: chore/openclaw-update
          delete-branch: true
          labels: |
            dependencies
            automated
