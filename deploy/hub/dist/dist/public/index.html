<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦞 JackClaw Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 24px 32px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 16px; }
.header h1 { font-size: 24px; color: #fff; }
.header .badge { background: #22c55e; color: #000; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.header .badge.offline { background: #ef4444; color: #fff; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 24px 32px; }
.card { background: #1a1a2e; border: 1px solid #333; border-radius: 12px; padding: 20px; }
.card h2 { font-size: 16px; color: #888; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
.stat { font-size: 48px; font-weight: 700; color: #fff; }
.stat-label { font-size: 14px; color: #666; margin-top: 4px; }
.node-list { list-style: none; }
.node-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #222; }
.node-item:last-child { border-bottom: none; }
.node-dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
.node-dot.offline { background: #666; }
.node-name { font-weight: 600; color: #fff; }
.node-role { color: #888; font-size: 13px; }
.node-meta { color: #555; font-size: 12px; margin-left: auto; }
.report-item { padding: 12px 0; border-bottom: 1px solid #222; }
.report-item:last-child { border-bottom: none; }
.report-from { color: #60a5fa; font-weight: 600; font-size: 13px; }
.report-text { color: #ccc; margin-top: 4px; font-size: 14px; }
.report-time { color: #555; font-size: 11px; margin-top: 4px; }
.msg-item { padding: 8px 0; }
.msg-from { color: #22c55e; font-weight: 600; font-size: 12px; }
.msg-text { color: #ddd; font-size: 14px; }
.msg-time { color: #555; font-size: 11px; }
.empty { color: #555; font-style: italic; padding: 20px 0; text-align: center; }
.refresh-bar { text-align: right; padding: 8px 32px; color: #555; font-size: 12px; }
.err { color: #ef4444; text-align: center; padding: 40px; }
</style>
</head>
<body>
<div class="header">
  <span style="font-size:32px">🦞</span>
  <h1>JackClaw Dashboard</h1>
  <span id="hub-badge" class="badge">Connecting...</span>
  <span style="margin-left:auto;color:#555;font-size:13px" id="hub-url"></span>
</div>
<div class="refresh-bar">Auto-refresh every 5s · <span id="last-refresh">—</span></div>

<div class="grid">
  <div class="card">
    <h2>📡 Nodes</h2>
    <div id="node-count"><span class="stat">—</span><div class="stat-label">registered</div></div>
    <ul class="node-list" id="node-list"></ul>
  </div>

  <div class="card">
    <h2>📝 Today's Reports</h2>
    <div id="report-count"><span class="stat">—</span><div class="stat-label">reports</div></div>
    <div id="report-list"></div>
  </div>

  <div class="card">
    <h2>💬 Recent Messages</h2>
    <div id="msg-list"></div>
  </div>

  <div class="card">
    <h2>🔐 Hub Info</h2>
    <div id="hub-info" style="color:#888">Loading...</div>
  </div>
</div>

<script>
const HUB = location.origin;
document.getElementById('hub-url').textContent = HUB;
let ceoToken = localStorage.getItem('jc-ceo-token') || '';

async function api(method, path, body, token) {
  const h = { 'Content-Type': 'application/json' };
  if (token) h['Authorization'] = 'Bearer ' + token;
  try {
    const r = await fetch(HUB + path, { method, headers: h, body: body ? JSON.stringify(body) : undefined });
    return { s: r.status, b: await r.json().catch(() => null) };
  } catch { return { s: 0, b: null }; }
}

async function ensureCeo() {
  if (ceoToken) return;
  const r = await api('POST', '/api/register', {
    nodeId: 'dashboard-ceo', name: '🖥️ Dashboard', role: 'ceo', publicKey: 'dashboard-key'
  });
  if (r.b?.token) { ceoToken = r.b.token; localStorage.setItem('jc-ceo-token', ceoToken); }
}

async function refresh() {
  // Health
  const health = await api('GET', '/health');
  const badge = document.getElementById('hub-badge');
  if (health.s === 200) {
    badge.textContent = 'Online';
    badge.className = 'badge';
  } else {
    badge.textContent = 'Offline';
    badge.className = 'badge offline';
    return;
  }

  await ensureCeo();

  // Hub info
  document.getElementById('hub-info').innerHTML =
    '<div>Status: <b style="color:#22c55e">Online</b></div>' +
    '<div>Service: ' + (health.b?.service || '—') + '</div>' +
    '<div>Uptime: ' + new Date(health.b?.ts || 0).toLocaleString() + '</div>';

  // Nodes
  const nodes = await api('GET', '/api/nodes', null, ceoToken);
  const nodeList = document.getElementById('node-list');
  const nodeArr = nodes.b?.nodes || [];
  document.querySelector('#node-count .stat').textContent = nodeArr.length;
  if (nodeArr.length === 0) {
    nodeList.innerHTML = '<div class="empty">No nodes registered yet</div>';
  } else {
    nodeList.innerHTML = nodeArr.map(n => {
      const ago = n.lastReportAt ? Math.round((Date.now() - n.lastReportAt) / 60000) + 'm ago' : 'never';
      return '<li class="node-item"><div class="node-dot"></div><div><div class="node-name">' +
        n.name + '</div><div class="node-role">' + n.role + ' · ' + n.nodeId.slice(0,12) +
        '</div></div><div class="node-meta">Last report: ' + ago + '</div></li>';
    }).join('');
  }

  // Summary
  const today = new Date().toISOString().slice(0,10);
  const summary = await api('GET', '/api/summary?date=' + today, null, ceoToken);
  const reportList = document.getElementById('report-list');
  const byRole = summary.b?.byRole || {};
  document.querySelector('#report-count .stat').textContent = summary.b?.reportingNodes || 0;
  const allReports = [];
  Object.values(byRole).forEach(role => (role.nodes || []).forEach(n => allReports.push(n)));
  if (allReports.length === 0) {
    reportList.innerHTML = '<div class="empty">No reports today</div>';
  } else {
    reportList.innerHTML = allReports.map(r =>
      '<div class="report-item"><div class="report-from">' + r.name + ' (' + r.nodeId + ')</div>' +
      '<div class="report-text">' + (r.summary || '—') + '</div>' +
      '<div class="report-time">' + new Date(r.reportedAt).toLocaleTimeString() + '</div></div>'
    ).join('');
  }

  document.getElementById('last-refresh').textContent = new Date().toLocaleTimeString();
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
